<!-- Shift Master Form -->
<mat-card class="custom-card">
    <mat-card-title class="text-center mb-3">
        {{ isEditMode ? ' Shift Master' : ' Shift Master' }}
    </mat-card-title>

    <mat-card-content>
        <form [formGroup]="shiftMasterForm" class="form-field-full">

            <!-- Checkboxes row -->
            <div class="row mb-3">
                <div class="col-12 d-flex gap-4 align-items-center justify-content-end">
                    <mat-checkbox formControlName="ShiftMasterAuth" color="primary">Auth</mat-checkbox>
                    <mat-checkbox formControlName="ShiftMasterIsActive" color="primary">Active</mat-checkbox>
                    <mat-checkbox formControlName="ShiftMasterIsDiscard" color="primary">Discard</mat-checkbox>
                </div>
            </div>

            <!-- 3-column layout for Shift Master fields -->
            <div class="row mb-3">
                <div class="col-sm-4 col-xl-4">
                    <mat-form-field appearance="outline" class="w-100">
                        <mat-label>Company Name</mat-label>
                        <mat-select formControlName="ShiftMasterCompanyId">
                            <mat-option [value]="null">Select Company</mat-option>
                            <mat-option *ngFor="let company of filteredCompanyList" [value]="company.CompanyId">
                                {{ company.CompanyName }}
                            </mat-option>
                        </mat-select>
                    </mat-form-field>
                </div>

                <div class="col-sm-4 col-xl-4">
                    <mat-form-field appearance="outline" class="w-100">
                        <mat-label>Shift Name</mat-label>
                        <input matInput formControlName="ShiftMasterName" placeholder="Enter shift name" />
                    </mat-form-field>
                </div>

                <div class="col-sm-4 col-xl-4">
                    <mat-form-field appearance="outline" class="w-100">
                        <mat-label>Employee Type</mat-label>
                        <mat-select formControlName="ShiftMasterEmployeeTypeId">
                            <mat-option [value]="null">Select Employee Type</mat-option>
                            <mat-option *ngFor="let emp of filteredEmployeeTypeList" [value]="emp.EmployeeTypeId">
                                {{ emp.EmployeeTypeName }}
                            </mat-option>
                        </mat-select>
                    </mat-form-field>
                </div>
            </div>

            <!-- Second row -->
            <div class="row mb-3">
                <div class="col-sm-4 col-xl-4">
                    <mat-form-field appearance="outline" class="w-100">
                        <mat-label>Start Time</mat-label>
                        <input matInput type="time" formControlName="ShiftMasterStartTime" />
                    </mat-form-field>
                </div>

                <div class="col-sm-4 col-xl-4">
                    <mat-form-field appearance="outline" class="w-100">
                        <mat-label>End Time</mat-label>
                        <input matInput type="time" formControlName="ShiftMasterEndTime" />
                    </mat-form-field>
                </div>

                <div class="col-sm-4 col-xl-4">
                    <mat-form-field appearance="outline" class="w-100">
                        <mat-label>Alias Name</mat-label>
                        <input matInput formControlName="ShiftMasterAliseName" placeholder="Enter alias name" />
                    </mat-form-field>
                </div>
            </div>

            <!-- Third row -->
            <div class="row mb-3">
                <div class="col-sm-4 col-xl-4">
                    <mat-form-field appearance="outline" class="w-100">
                        <mat-label>Lunch Start Time</mat-label>
                        <input matInput type="time" formControlName="ShiftMasterLunchStartTime" />
                    </mat-form-field>
                </div>

                <div class="col-sm-4 col-xl-4">
                    <mat-form-field appearance="outline" class="w-100">
                        <mat-label>Lunch End Time</mat-label>
                        <input matInput type="time" formControlName="ShiftMasterLunchEndTime" />
                    </mat-form-field>
                </div>

                <div class="col-sm-4 col-xl-4">
                    <mat-form-field appearance="outline" class="w-100">
                        <mat-label>Remark</mat-label>
                        <input matInput formControlName="ShiftMasterRemark" placeholder="Enter remark..." />
                    </mat-form-field>
                </div>
            </div>

            <!-- Fourth row -->
            <div class="row mb-3">
                <div class="col-sm-4 col-xl-4">
                    <mat-form-field appearance="outline" class="w-100">
                        <mat-label>Auth Remark</mat-label>
                        <input matInput formControlName="ShiftMasterAuthRemark" placeholder="Enter auth remark..." />
                    </mat-form-field>
                </div>
                <div class="col-sm-8 col-xl-8"></div>
            </div>

            <!-- Action Buttons -->
            <div class="row">
                <div class="col-12 text-center mt-4">
                    <button mat-flat-button color="primary" [disabled]="shiftMasterForm.invalid" (click)="onSubmit()">
                        <mat-icon class="me-1">{{ isEditMode ? 'update' : 'save' }}</mat-icon>
                        {{ isEditMode ? 'Update' : 'Save' }}
                    </button>

                    <button mat-stroked-button type="button" class="ms-3" (click)="onCancel()">
                        <mat-icon class="me-1">close</mat-icon>
                        Cancel
                    </button>
                </div>
            </div>

        </form>
    </mat-card-content>
</mat-card>
