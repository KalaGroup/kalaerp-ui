<mat-card>
  <mat-card-title>{{ isEditMode ? 'Edit Qualification Type' : 'Add Qualification Type' }}</mat-card-title>

  <!-- Please Note Change Form control as per your Requirements  -->
  <mat-card-content>
    <form [formGroup]="qualificationtypeForm" class="form-field-full">
      <div class="row mb-3">
        <div class="col-sm-4 col-xl-3">

        </div>

        <div class="col-sm-4 col-xl-3">
          <div class="d-flex align-items-center justify-content-end" style="height: 56px">
            <mat-checkbox formControlName="QualificationTypeAuth" color="primary" [disabled]="!isEditMode">
              Auth
            </mat-checkbox>
            <mat-checkbox formControlName="QualificationTypeIsActive" color="primary" [disabled]="!isEditMode">
              Active
            </mat-checkbox>
            <mat-checkbox formControlName="QualificationTypeIsDiscard" color="primary" [disabled]="!isEditMode"
              *ngIf="isEditMode">
              Discard
            </mat-checkbox>
          </div>
        </div>
      </div>

      <div class="row mb-3">
        <!-- Left side  -->
        <div class="col-sm-6 col-xl-6">
          <!-- Qualification Code -->
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Qualification Code</mat-label>
            <input matInput formControlName="QualificationTypeCode" placeholder="Enter Company Entity Type Name" />
            <mat-error
              *ngIf="qualificationtypeForm.get('QualificationTypeCode')?.hasError('required') && qualificationtypeForm.get('QualificationTypeCode')?.touched">
              Qualification Code is required
            </mat-error>
          </mat-form-field>

          <!-- Remark -->
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Remark</mat-label>
            <input matInput formControlName="QualificationTypeRemark" placeholder="Enter remark..." />
            <mat-error
              *ngIf="qualificationtypeForm.get('QualificationTypeRemark')?.hasError('required') && qualificationtypeForm.get('QualificationTypeRemark')?.touched">
              Remark is required
            </mat-error>
          </mat-form-field>

        </div>

        <!-- Right side  -->

        <div class="col-sm-6 col-xl-6">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Qualification Name</mat-label>
            <input matInput formControlName="QualificationTypeName"
              placeholder="Enter Company Entity Type Short Name" />
            <mat-error
              *ngIf="qualificationtypeForm.get('QualificationTypeName')?.hasError('required') && qualificationtypeForm.get('QualificationTypeName')?.touched">
              Qualification Name is required
            </mat-error>
          </mat-form-field>


        </div>
      </div>

      <!-- Action buttons -->
      <div class="row">
        <div class="col-12">
          <div class="d-flex justify-content-center gap-3 mt-4">
            <button mat-flat-button color="primary" class="btn-primary px-4" [disabled]="qualificationtypeForm.invalid"
              (click)="onSubmit()">
              <mat-icon>{{ isEditMode ? 'update' : 'save' }}</mat-icon>
              {{ isEditMode ? 'Update' : 'Save' }}
            </button>

            <button mat-button type="button" class="btn-outline px-4" (click)="onCancel()">
              <mat-icon>close</mat-icon>
              Cancel
            </button>
          </div>
        </div>
      </div>
    </form>
  </mat-card-content>
</mat-card>
