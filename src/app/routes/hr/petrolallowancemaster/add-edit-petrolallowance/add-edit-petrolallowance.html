<mat-card>
    <mat-card-title>
        {{ isEditMode ? 'Edit Petrol Allowance' : 'Add Petrol Allowance' }}
    </mat-card-title>

    <mat-card-content class="config-content">
        <form [formGroup]="petrolForm" class="form-field-full">

            <!-- Row: ID, Created Date -->
            <div class="row mb-3 option-section">
                <!-- <div class="col-sm-6 col-md-4">
                    <mat-form-field appearance="outline" class="w-100">
                        <mat-label>Petrol Allowance ID</mat-label>
                        <input matInput formControlName="PetrolAllowanceId" readonly placeholder="Auto-generated" />
                    </mat-form-field>
                </div> -->

                <!-- <div class="col-sm-6 col-md-4">
                    <mat-form-field appearance="outline" class="w-100">
                        <mat-label>Created By</mat-label>
                        <input matInput formControlName="CreatedBy" readonly placeholder="Auto-filled by system" />
                    </mat-form-field>
                </div> -->
                <mat-checkbox formControlName="PetrolAllowanceIsActive" color="primary" [disabled]="!isEditMode">
                    Active
                </mat-checkbox>
                <mat-checkbox formControlName="PetrolAllowanceIsAuth" color="primary" [disabled]="!isEditMode">
                    Authorized
                </mat-checkbox>
                <mat-checkbox formControlName="PetrolAllowanceIsDiscard" color="warn" [disabled]="!isEditMode">
                    Discarded
                </mat-checkbox>


            </div>

            <!-- Row: Rates -->
            <div class="row mb-3 option-section">
                <div class="col-md-6">
                    <mat-form-field appearance="outline" class="w-100">
                        <mat-label>Two Wheeler Rate (per km)</mat-label>
                        <input matInput formControlName="TwoWheelerPerKm" placeholder="e.g., 2.50" />
                    </mat-form-field>
                </div>

                <div class="col-md-6">
                    <mat-form-field appearance="outline" class="w-100">
                        <mat-label>Four Wheeler Rate (per km)</mat-label>
                        <input matInput formControlName="FourWheelerPerKm" placeholder="e.g., 5.00" />
                    </mat-form-field>
                </div>
            </div>

            <!-- Row: Remarks -->
            <div class="row mb-3 option-section">
                <div class="col-md-6">
                    <mat-form-field appearance="outline" class="w-100">
                        <mat-label>Remark</mat-label>
                        <input matInput formControlName="PetrolAllowanceRemark" placeholder="Enter remark (optional)" />
                    </mat-form-field>
                </div>

                <div class="col-md-6">
                    <mat-form-field appearance="outline" class="w-100">
                        <mat-label>Authorization Remark</mat-label>
                        <input matInput formControlName="PetrolAllowanceAuthRemark"
                            placeholder="Enter auth remark (optional)" />
                    </mat-form-field>
                </div>
            </div>

            <!-- Row: Checkboxes -->
            <!-- <div class="row mb-3 option-section">
                <div class="col-sm-4 d-flex align-items-center">
                    <mat-checkbox formControlName="PetrolAllowanceIsActive" color="primary" [disabled]="!isEditMode">
                        Active
                    </mat-checkbox>
                </div>

                <div class="col-sm-4 d-flex align-items-center">
                    <mat-checkbox formControlName="PetrolAllowanceIsAuth" color="primary" [disabled]="!isEditMode">
                        Authorized
                    </mat-checkbox>
                </div>

                <div class="col-sm-4 d-flex align-items-center">
                    <mat-checkbox formControlName="PetrolAllowanceIsDiscard" color="warn" [disabled]="!isEditMode">
                        Discarded
                    </mat-checkbox>
                </div>
            </div> -->

            <!-- Action Buttons -->
            <div class="row mt-4">
                <div class="col-12 d-flex justify-content-center gap-3">
                    <button mat-flat-button color="primary" class="primary-btn" [disabled]="petrolForm.invalid"
                        (click)="onSubmit()">
                        <mat-icon>{{ isEditMode ? 'update' : 'save' }}</mat-icon>
                        {{ isEditMode ? 'Update' : 'Save' }}
                    </button>

                    <button mat-stroked-button type="button" class="action-btn" (click)="onCancel()">
                        <mat-icon>close</mat-icon>
                        Cancel
                    </button>
                </div>
            </div>

        </form>
    </mat-card-content>
</mat-card>
