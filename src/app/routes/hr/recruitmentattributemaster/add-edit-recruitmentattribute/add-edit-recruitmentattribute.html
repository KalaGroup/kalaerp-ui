<mat-card>
  <mat-card-title>{{ isEditMode ? 'Edit Recruitment Attributes' : 'Add Recruitment Attributes' }}</mat-card-title>

  <!-- Please Note Change Form control as per your Requirements  -->
  <mat-card-content>
    <form [formGroup]="cityForm" class="form-field-full">
      <!-- Auto-generated fields row -->
      <div class="row mb-3">
        <div class="col-sm-4 col-xl-3">
          <mat-form-field *ngIf="isEditMode" appearance="fill">
            <mat-label>Attribute ID</mat-label>
            <input
              matInput
              formControlName="CityId"
              [readonly]="true"
              placeholder="Enter Recruitment Attribute ID"
            />
          </mat-form-field>
        </div>

        <div class="col-sm-4 col-xl-3">
          <div class="d-flex align-items-center justify-content-end" style="height: 56px">
            <mat-checkbox formControlName="CityAuth" color="primary" [disabled]="!isEditMode">
              Auth
            </mat-checkbox>
            <mat-checkbox formControlName="CityIsActive" color="primary" [disabled]="!isEditMode">
              Active
            </mat-checkbox>
            <mat-checkbox
              formControlName="CityIsDiscard"
              color="primary"
              [disabled]="!isEditMode"
              *ngIf="isEditMode"
            >
              Discard
            </mat-checkbox>
          </div>
        </div>
      </div>

      <div class="row mb-3">
        <!-- Left side (City Name, Short Name, Latitude, Longitude, Remark) -->
        <div class="col-sm-6 col-xl-6">
          <mat-form-field appearance="fill" class="w-100">
            <mat-label>Recruitment Attribute Name</mat-label>
            <input matInput formControlName="CityName" placeholder="Enter Recruitment Attribute Name" />
            <!-- @if (cityForm.get('CityName')?.invalid && cityForm.get('CityName')?.touched) {
              <mat-error>City Name is required</mat-error>
            } -->
          </mat-form-field>



          <mat-form-field appearance="fill" class="w-100">
            <mat-label>Remark</mat-label>
            <input matInput formControlName="CityRemark" placeholder="Enter remark..." />
            <!-- @if (cityForm.get('CityRemark')?.invalid && cityForm.get('CityRemark')?.touched) {
              <mat-error>City Remark is required</mat-error>
            } -->
          </mat-form-field>
        </div>

        <!-- Right side (Country, State, District, Tier Type) -->

        <div class="col-sm-6 col-xl-6">
          <mat-form-field appearance="fill" class="w-100">
            <mat-label>Marks</mat-label>
            <input matInput formControlName="CityCode" placeholder="Enter Marks" type="number"/>
            <!-- @if (cityForm.get('CityCode')?.invalid && cityForm.get('CityCode')?.touched) {
              <mat-error>City Code is required</mat-error>
            } -->
          </mat-form-field>

          <mat-form-field appearance="fill" class="w-100" *ngIf="isEditMode">
            <mat-label> Auth Remark</mat-label>
            <input matInput formControlName="CityRemark" placeholder="Enter remark..." />
            @if (cityForm.get('CityRemark')?.invalid && cityForm.get('CityRemark')?.touched) {
            <mat-error>City Remark is required</mat-error>
            }
          </mat-form-field>

          <mat-form-field appearance="fill" class="w-100" *ngIf="isEditMode">
            <mat-label>Auth Remark</mat-label>
            <input matInput formControlName="CityRemark" placeholder="Enter Auth remark..." />
          </mat-form-field>
        </div>
      </div>

      <!-- Action buttons -->
      <div class="row">
        <div class="col-12">
          <div class="d-flex justify-content-center gap-3 mt-4">
            <button
              mat-flat-button
              color="primary"
              class="btn-primary px-4"
              [disabled]="cityForm.invalid"
              (click)="onSubmit()"
            >
              <mat-icon>{{ isEditMode ? 'update' : 'save' }}</mat-icon>
              {{ isEditMode ? 'Update' : 'Save' }}
            </button>

            <button mat-button type="button" class="btn-outline px-4" (click)="onCancel()">
              <mat-icon>close</mat-icon>
              Cancel
            </button>
          </div>
        </div>
      </div>
    </form>
  </mat-card-content>
</mat-card>
