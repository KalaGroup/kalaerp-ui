<page-header class="bg-green-50" />

<div class="container-fluid">
  <!-- Control Panel Card -->

  <!-- Action Buttons Card -->
  <div class="d-flex flex-wrap gap-2 align-items-center mb-3">
    <button mat-raised-button color="primary" class="px-4 d-flex align-items-center gap-1" (click)="openAddDialog()">
      <mat-icon>add</mat-icon>
      Add New
    </button>
  </div>

  <!-- Data Grid Card -->
  <mat-card>
    <mat-card-content class="p-0">
      <mtx-grid [data]="list" [columns]="ctcColumns" [loading]="isLoading" [columnResizable]="columnResizable"
        [multiSelectable]="multiSelectable" [rowSelectable]="rowSelectable"
        [hideRowSelectionCheckbox]="hideRowSelectionCheckbox" [rowHover]="rowHover" [rowStriped]="rowStriped"
        [showToolbar]="showToolbar" [toolbarTitle]="'CTC Master'" [columnHideable]="columnHideable"
        [columnSortable]="columnSortable" [columnPinnable]="columnPinnable" [expandable]="expandable"
        [expansionTemplate]="expansionTpl" [pageOnFront]="showPaginator" [showPaginator]="showPaginator"
        [pageSizeOptions]="[5, 10, 50, 100]" [pageIndex]="0" [pageSize]="5" (sortChange)="changeSort($event)"
        (selectionChange)="changeSelect($event)" />
    </mat-card-content>
  </mat-card>
</div>

<ng-template #expansionTpl let-row>
  {{ row.CityName }} ({{ row.CityID }})
</ng-template>
