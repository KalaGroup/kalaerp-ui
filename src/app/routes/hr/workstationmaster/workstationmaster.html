
<page-header class="bg-green-50" />

<div class="container-fluid">
  <!-- Control Panel Card -->

  <!-- Action Buttons Card -->
  <mat-card class="mb-4">
    <mat-card-content>
      <div class="d-flex flex-wrap justify-content-between align-items-center gap-3">
        <div class="d-flex flex-wrap gap-2 align-items-center">
          <button mat-button class="action-btn" (click)="updateCell()">
            <mat-icon>edit</mat-icon>
            Update
          </button>
          <button mat-button class="action-btn" (click)="updateList()">
            <mat-icon>refresh</mat-icon>
            Refresh
          </button>
          <button mat-raised-button class="primary-btn" (click)="openAddDialog()">
            <mat-icon>add</mat-icon>
            Add New
          </button>
        </div>
      </div>
    </mat-card-content>
  </mat-card>

  <!-- Data Grid Card -->
  <mat-card>
    <mat-card-content class="p-0">
      <mtx-grid
        [data]="list"
        [columns]="cityColumns"
        [loading]="isLoading"
        [columnResizable]="columnResizable"
        [multiSelectable]="multiSelectable"
        [rowSelectable]="rowSelectable"
        [hideRowSelectionCheckbox]="hideRowSelectionCheckbox"
        [rowHover]="rowHover"
        [rowStriped]="rowStriped"
        [showToolbar]="showToolbar"
        [toolbarTitle]="'WorkStation Master'"
        [columnHideable]="columnHideable"
        [columnSortable]="columnSortable"
        [columnPinnable]="columnPinnable"
        [expandable]="expandable"
        [expansionTemplate]="expansionTpl"
        [pageOnFront]="showPaginator"
        [showPaginator]="showPaginator"
        [pageSizeOptions]="[5, 10, 50, 100]"
        [pageIndex]="0"
        [pageSize]="5"
        (sortChange)="changeSort($event)"
        (selectionChange)="changeSelect($event)" />
    </mat-card-content>
  </mat-card>
</div>

<ng-template #expansionTpl let-row>
  {{ row.CityName }} ({{ row.CityID }})
</ng-template>
