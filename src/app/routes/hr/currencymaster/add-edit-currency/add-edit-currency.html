<mat-card>
  <mat-card-title>
    {{ isEditMode ? 'Currency' : 'Currency' }}
  </mat-card-title>

  <mat-card-content>
    <form [formGroup]="currencyForm" class="form-field-full">

      <!-- Checkbox Row -->
      <div class="row mb-3">
        <div class="col-sm-12 col-md-6 col-xl-4 ms-auto">
          <div class="d-flex align-items-center justify-content-end gap-3" style="height: 56px;">
            <mat-checkbox formControlName="CurrencyAuth" color="primary" [disabled]="!isEditMode">
              Auth
            </mat-checkbox>
            <mat-checkbox formControlName="CurrencyIsActive" color="primary" [disabled]="!isEditMode">
              Active
            </mat-checkbox>
            <mat-checkbox formControlName="CurrencyDiscard" color="primary" [disabled]="!isEditMode">
              Discard
            </mat-checkbox>
          </div>
        </div>
      </div>

      <!-- Input Fields Row -->
      <div class="row">
        <div class="col-sm-6 col-xl-4 mb-3">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Currency Name</mat-label>
            <input matInput formControlName="CurrencyName" placeholder="Enter full currency name" maxlength="50" />
            <mat-error
              *ngIf="currencyForm.get('CurrencyName')?.hasError('required') && currencyForm.get('CurrencyName')?.touched">
              Currency Name is required
            </mat-error>
          </mat-form-field>
        </div>

        <div class="col-sm-6 col-xl-4 mb-3">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Currency Symbol</mat-label>
            <input matInput formControlName="CurrencySymbol" placeholder="e.g. ¥, $" maxlength="5" />
            <mat-error
              *ngIf="currencyForm.get('CurrencySymbol')?.hasError('required') && currencyForm.get('CurrencySymbol')?.touched">
              Currency Symbol is required
            </mat-error>
          </mat-form-field>
        </div>

        <div class="col-sm-6 col-xl-4 mb-3">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Currency Remark</mat-label>
            <input matInput formControlName="CurrencyRemark" placeholder="Enter remark..." maxlength="100" />
            <mat-error
              *ngIf="currencyForm.get('CurrencyRemark')?.hasError('required') && currencyForm.get('CurrencyRemark')?.touched">
              Currency Remark is required
            </mat-error>
          </mat-form-field>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="row">
        <div class="col-12">
          <div class="d-flex justify-content-center gap-3 mt-4">
            <button mat-flat-button color="primary" class="px-4" [disabled]="currencyForm.invalid" (click)="onSubmit()"
              type="submit">
              <mat-icon>{{ isEditMode ? 'update' : 'save' }}</mat-icon>
              {{ isEditMode ? 'Update' : 'Save' }}
            </button>

            <button mat-stroked-button color="warn" type="button" class="px-4" (click)="onCancel()">
              <mat-icon>close</mat-icon>
              Cancel
            </button>
          </div>
        </div>
      </div>

    </form>
  </mat-card-content>
</mat-card>
