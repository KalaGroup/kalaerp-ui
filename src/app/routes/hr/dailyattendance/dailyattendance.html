<page-header class="bg-green-50" />

<div class="container-fluid">
    <mat-card class="mb-4">
        <mat-card-content>

            <form [formGroup]="filterForm" class="d-flex flex-wrap gap-2 align-items-center">

                <div class="d-flex flex-wrap justify-content-between align-items-center gap-3">
                    <mat-label>From Date</mat-label>
                    <input matInput placeholder="From Date" [matDatepicker]="pickerFrom" formControlName="fromDate"
                        class="small-input">
                    <mat-datepicker-toggle matSuffix [for]="pickerFrom"></mat-datepicker-toggle>
                    <mat-datepicker #pickerFrom></mat-datepicker>

                    <mat-label>To Date</mat-label>
                    <input matInput placeholder="To Date" [matDatepicker]="pickerTo" formControlName="toDate"
                        class="small-input">
                    <mat-datepicker-toggle matSuffix [for]="pickerTo"></mat-datepicker-toggle>
                    <mat-datepicker #pickerTo></mat-datepicker>

                    <button mat-raised-button color="primary" (click)="filterByDate()">
                        <mat-icon>search</mat-icon>
                        Search
                    </button>

                    <button mat-button color="warn" (click)="resetFilter()">
                        <mat-icon>clear</mat-icon> Reset
                    </button>
                </div>

            </form>
        </mat-card-content>
    </mat-card>


    <!-- Data Grid Card -->
    <mat-card>
        <mat-card-content class="p-0">
            <mtx-grid [data]="list" [columns]="Columns" [loading]="isLoading" [columnResizable]="columnResizable"
                [multiSelectable]="multiSelectable" [hideRowSelectionCheckbox]="hideRowSelectionCheckbox"
                [rowHover]="rowHover" [rowStriped]="rowStriped" [showToolbar]="showToolbar"
                [toolbarTitle]="'Daily Attendance'" [columnHideable]="columnHideable" [columnSortable]="columnSortable"
                [columnPinnable]="columnPinnable" [expandable]="expandable" [expansionTemplate]="expansionTpl"
                [pageOnFront]="showPaginator" [showPaginator]="showPaginator" [pageSizeOptions]="[5, 10, 50, 100]"
                [pageIndex]="0" [pageSize]="5" (sortChange)="changeSort($event)"
                (selectionChange)="changeSelect($event)" />
        </mat-card-content>
    </mat-card>
    <!-- </div> -->


    <ng-template #expansionTpl let-row>
        {{ row.Daily }}
    </ng-template>
