<page-header class="bg-green-50"></page-header>

<div class="container-fluid p-3">
    <!-- Filter Section -->
    <mat-card class="mb-4">
        <mat-card-content>
            <form [formGroup]="filterForm" class="filter-form">
                <div class="d-flex flex-wrap  align-items-end">

                    <!-- From Date -->
                    <div class="date-filter d-flex flex-wrap align-items-end gap-3">
                        <!-- From Date -->
                        <mat-form-field appearance="outline" class="date-field">
                            <mat-label>From Date</mat-label>
                            <input matInput [matDatepicker]="pickerFrom" formControlName="fromDate">
                            <mat-datepicker-toggle matSuffix [for]="pickerFrom"></mat-datepicker-toggle>
                            <mat-datepicker #pickerFrom></mat-datepicker>
                        </mat-form-field>

                        <!-- To Date -->
                        <mat-form-field appearance="outline" class="date-field">
                            <mat-label>To Date</mat-label>
                            <input matInput [matDatepicker]="pickerTo" formControlName="toDate">
                            <mat-datepicker-toggle matSuffix [for]="pickerTo"></mat-datepicker-toggle>
                            <mat-datepicker #pickerTo></mat-datepicker>
                        </mat-form-field>

                        <div class="d-flex gap-2" style="padding: 10px 0;">
                            <button mat-raised-button color="primary" (click)="filterByDate()">
                                <mat-icon>search</mat-icon> Search
                            </button>
                        </div>
                        <div style="padding: 10px;">
                            <button mat-raised-button color="accent" (click)="resetFilter()">
                                <mat-icon>clear</mat-icon> Reset
                            </button>
                        </div>


                    </div>




                </div>
            </form>
        </mat-card-content>
    </mat-card>

    <!-- Data Grid Card -->
    <mat-card>


        <mat-card-content class="p-0">
            <!-- Configuration Section (Collapsible) -->


            <!-- Grid -->
            <mtx-grid [data]="list" [columns]="Columns" [loading]="isLoading" [columnResizable]="columnResizable"
                [multiSelectable]="multiSelectable" [hideRowSelectionCheckbox]="hideRowSelectionCheckbox"
                [rowHover]="rowHover" [rowStriped]="rowStriped" [showToolbar]="showToolbar"
                [toolbarTitle]="'Daily Attendance'" [columnHideable]="columnHideable" [columnSortable]="columnSortable"
                [columnPinnable]="columnPinnable" [expandable]="expandable" [showPaginator]="showPaginator"
                [pageSizeOptions]="[5, 10, 25, 50, 100]" [pageSize]="10" (sortChange)="changeSort($event)"
                (selectionChange)="changeSelect($event)">
            </mtx-grid>
        </mat-card-content>
    </mat-card>

</div>
